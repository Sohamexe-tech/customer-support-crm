<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Ticket</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 text-slate-800">
    <div class="max-w-3xl mx-auto p-6">
        <h1 class="text-2xl font-bold mb-4">Create Ticket</h1>
        <a href="/" class="text-blue-600 mb-4 inline-block">Back</a>
        <form method="post" action="/tickets/new" class="bg-white p-6 rounded shadow space-y-4">
            <input type="text" name="customer_name" placeholder="Customer Name" required
                class="w-full border rounded px-3 py-2">
            <input type="email" name="customer_email" placeholder="Customer Email" required
                class="w-full border rounded px-3 py-2">
            <input type="text" name="subject" placeholder="Subject" required class="w-full border rounded px-3 py-2">
            <textarea name="description" rows="5" placeholder="Description" required
                class="w-full border rounded px-3 py-2"></textarea>
            <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded">Save Ticket</button>
        </form>
    </div>
</body>

</html>
