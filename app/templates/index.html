<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Support CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-800">
    <div class="max-w-5xl mx-auto p-6">
        <h1 class="text-3xl font-bold mb-2">Customer Support CRM</h1>
        <a href="/tickets/new" class="bg-blue-600 text-white px-4 py-2 rounded inline-block mb-6">Create Ticket</a>
        <form method="get" class="mb-6 flex gap-3">
            <input type="text" name="search" value="{{ search }}" placeholder="Search tickets"
                class="border rounded px-3 py-2 w-full">
            <select name="status" class="border rounded px-3 py-2">
                <option value="">All</option>
                <option value="open" {% if status=='open' %}selected{% endif %}>Open</option>
                <option value="in_progress" {% if status=='in_progress' %}selected{% endif %}>In Progress</option>
                <option value="resolved" {% if status=='resolved' %}selected{% endif %}>Resolved</option>
            </select>
            <button type="submit" class="bg-slate-800 text-white px-4 py-2 rounded">Filter</button>
        </form>
        <div class="bg-white rounded shadow">
            <table class="w-full text-left">
                <thead class="bg-slate-200">
                    <tr>
                        <th class="p-3">Ticket ID</th>
                        <th class="p-3">Customer</th>
                        <th class="p-3">Subject</th>
                        <th class="p-3">Status</th>
                        <th class="p-3">Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% for ticket in tickets %}
                    <tr class="border-t">
                        <td class="p-3">{{ ticket.ticket_id }}</td>
                        <td class="p-3">{{ ticket.customer_name }}</td>
                        <td class="p-3">{{ ticket.subject }}</td>
                        <td class="p-3">{{ ticket.status }}</td>
                        <td class="p-3 flex gap-3 items-center">
                            <a href="/tickets/{{ ticket.id }}" class="text-blue-600">View</a>
                            <form method="post" action="/tickets/{{ ticket.id }}/delete"
                                onsubmit="return confirm('Are you sure you want to delete this ticket?');">
                                <button type="submit" class="text-red-600">Delete</button>
                            </form>
                        </td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="5" class="p-4 text-center text-slate-500">No tickets found.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
