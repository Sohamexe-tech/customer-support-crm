<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-800">
    <div class="max-w-3xl mx-auto p-6">
        <h1 class="text-2xl font-bold mb-4">Ticket Details</h1>
        <a href="/" class="text-blue-600 mb-4 inline-block">Back</a>
        <div class="bg-white p-6 rounded shadow mb-6">
            <p class="text-sm text-slate-500">{{ ticket.ticket_id }}</p>
            <h2 class="text-xl font-semibold">{{ ticket.subject }}</h2>
            <p class="mt-2">{{ ticket.description }}</p>
            <p class="mt-4"><strong>Customer:</strong> {{ ticket.customer_name }}</p>
            <p><strong>Email:</strong> {{ ticket.customer_email }}</p>
            <p><strong>Status:</strong> {{ ticket.status }}</p>
        </div>
        <form method="post" action="/tickets/{{ ticket.id }}/delete" class="mb-6"
            onsubmit="return confirm('Are you sure you want to delete this ticket?');">
            <button type="submit" class="bg-red-600 text-white px-4 py-2 rounded">Delete Ticket</button>
        </form>
        <form method="post" action="/tickets/{{ ticket.id }}/status" class="bg-white p-6 rounded shadow mb-6">
            <label class="block mb-2">Update Status</label>
            <select name="status" class="border rounded px-3 py-2 w-full">
                <option value="open" {% if ticket.status=='open' %}selected{% endif %}>Open</option>
                <option value="in_progress" {% if ticket.status=='in_progress' %}selected{% endif %}>In Progress
                </option>
                <option value="resolved" {% if ticket.status=='resolved' %}selected{% endif %}>Resolved</option>
            </select>
            <button type="submit" class="bg-slate-800 text-white px-4 py-2 rounded mt-4">Update</button>
        </form>
        <form method="post" action="/tickets/{{ ticket.id }}/notes" class="bg-white p-6 rounded shadow">
            <label class="block mb-2">Add Note</label>
            <textarea name="note" rows="3" class="w-full border rounded px-3 py-2" required></textarea>
            <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded mt-4">Save Note</button>
        </form>
    </div>
</body>
</html>
